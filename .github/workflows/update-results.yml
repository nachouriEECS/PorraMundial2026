name: Update results

# Fetches real World Cup results and commits data/results.json when it changes.
# Runs on a schedule, and can be triggered by hand from the Actions tab.

on:
  schedule:
    # Every 10 minutes. NOTE: GitHub runs scheduled jobs on a best-effort basis
    # and often delays them under load, so updates can still lag behind real time.
    # For an instant refresh after a game, use the "Run workflow" button.
    - cron: "*/10 * * * *"
  workflow_dispatch:          # manual "Run workflow" button

# Allow the job to push the updated data file back to the repo.
permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The group stage is over and its results are final (frozen in
      # data/results.json), so we no longer call the API for it. Only the
      # Round-of-32 results are fetched now.
      - name: Fetch Round-of-32 results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python3 scripts/fetch_results_r32.py

      - name: Commit if changed
        run: |
          git config user.name  "porra-bot"
          git config user.email "porra-bot@users.noreply.github.com"
          git add RondaEliminatoria/data/results.json
          if ! git diff --cached --quiet; then
            git commit -m "Update results ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "No changes to results."
          fi
